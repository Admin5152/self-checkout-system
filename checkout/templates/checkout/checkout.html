<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Self-Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #e8f5e9;
            border-radius: 20px;
            font-weight: 600;
            color: #2e7d32;
        }

        .status-badge.scanning {
            background: #fff3e0;
            color: #f57c00;
        }

        .status-badge.detected {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2e7d32;
            animation: pulse 2s infinite;
        }

        .status-badge.scanning .status-dot {
            background: #f57c00;
        }

        .status-badge.detected .status-dot {
            background: #1976d2;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Camera Section */
        .camera-section {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .camera-feed {
            width: 100%;
            height: 500px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .camera-feed img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-loading {
            color: #fff;
            font-size: 14px;
        }

        .detection-info {
            padding: 20px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
        }

        .detection-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .last-detected {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .detected-item-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .detected-item-name.empty {
            color: #999;
            font-style: italic;
        }

        .confidence-bar {
            flex: 1;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }

        .confidence-bar.visible {
            display: block;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #2e7d32, #66bb6a);
            width: 0%;
            transition: width 0.3s ease;
        }

        .confidence-percent {
            font-size: 14px;
            font-weight: 600;
            color: #2e7d32;
            min-width: 45px;
            text-align: right;
        }

        /* Cart Section */
        .cart-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 2px solid #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .cart-header h2 {
            font-size: 22px;
            margin: 0;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            min-height: 200px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            color: #333;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .cart-item-details {
            font-size: 13px;
            color: #666;
        }

        .cart-item-price {
            text-align: right;
        }

        .cart-item-total {
            font-weight: 600;
            font-size: 16px;
            color: #667eea;
        }

        .cart-item-qty {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .empty-cart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #ccc;
            text-align: center;
        }

        .empty-cart-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .empty-cart-text {
            font-size: 14px;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: #fafafa;
        }

        .total-section {
            margin-bottom: 15px;
        }

        .total-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .btn-pay {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-pay:active {
            transform: translateY(0);
        }

        .btn-pay:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            color: #666;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-clear:hover {
            background: #ececec;
        }

        /* Receipt Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .receipt-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .receipt-header h2 {
            color: #2e7d32;
            font-size: 24px;
            margin: 0;
        }

        .receipt-items {
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .receipt-item-name {
            color: #333;
        }

        .receipt-item-price {
            color: #666;
            font-weight: 600;
        }

        .receipt-total {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
        }

        .receipt-details {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .btn-receipt-close {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-receipt-close:hover {
            opacity: 0.9;
        }

        /* Sound effect (visual feedback) */
        @keyframes cartAddPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .cart-add-pulse .cart-header {
            animation: cartAddPulse 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛒 Self-Checkout</h1>
            <div class="status-badge scanning" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">Scanning...</span>
            </div>
        </div>

        <!-- Camera Section -->
        <div class="camera-section">
            <div class="camera-feed" id="cameraFeed">
                <img src="/api/video-feed/" alt="Live Camera Feed" />
            </div>
            <div class="detection-info">
                <div class="detection-label">Last Detected Item</div>
                <div class="last-detected">
                    <div class="detected-item-name empty" id="detectedItemName">No item detected</div>
                </div>
                <div class="confidence-bar" id="confidenceBar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
                <div class="confidence-percent" id="confidencePercent"></div>
            </div>
        </div>

        <!-- Cart Section -->
        <div class="cart-section">
            <div class="cart-header">
                <h2>Shopping Cart</h2>
            </div>
            <div class="cart-items" id="cartItems">
                <div class="empty-cart">
                    <div class="empty-cart-icon">🛍️</div>
                    <div class="empty-cart-text">No items in cart yet<br>Start scanning products...</div>
                </div>
            </div>
            <div class="cart-footer">
                <div class="total-section">
                    <div class="total-label">Total Amount</div>
                    <div class="total-amount" id="totalAmount">GHS 0.00</div>
                </div>
                <button class="btn-pay" id="payBtn" onclick="openPaymentModal()">Pay Now</button>
                <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal" id="receiptModal">
        <div class="modal-content">
            <div class="receipt-header">
                <div class="receipt-icon">✓</div>
                <h2>Payment Successful!</h2>
            </div>
            <div class="receipt-items" id="receiptItems"></div>
            <div class="receipt-total">
                <span>Total Paid:</span>
                <span id="receiptTotal">GHS 0.00</span>
            </div>
            <div class="receipt-details">
                <p>Thank you for shopping!<br>
                <strong id="transactionId">TX-000000</strong><br>
                <span id="transactionTime"></span></p>
            </div>
            <button class="btn-receipt-close" onclick="closeReceiptAndStartNew()">Start New Transaction</button>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = '/api';
        const POLL_INTERVAL = 2000; // 2 seconds
        const CART_UPDATE_INTERVAL = 500; // 0.5 seconds for instant updates

        // State
        let currentTransactionId = null;
        let lastDetectionTime = 0;
        let pollInterval = null;
        let lastDetectedItem = null;

        // Audio context for beep
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(frequency = 800, duration = 200) {
            try {
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                osc.frequency.value = frequency;
                osc.type = 'sine';

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);

                osc.start(now);
                osc.stop(now + duration / 1000);
            } catch (e) {
                console.log('Audio not available');
            }
        }

        // Initialize transaction on page load
        async function initTransaction() {
            try {
                const response = await fetch(`${API_BASE}/latest-transaction/`);
                const data = await response.json();
                currentTransactionId = data.id;
                console.log('Transaction initialized:', currentTransactionId);
                updateCart();
            } catch (error) {
                console.error('Failed to initialize transaction:', error);
            }
        }

        // Update cart display
        async function updateCart() {
            if (!currentTransactionId) return;

            try {
                const response = await fetch(`${API_BASE}/cart/${currentTransactionId}/`);
                const data = await response.json();

                const cartItemsDiv = document.getElementById('cartItems');
                const totalAmountDiv = document.getElementById('totalAmount');

                if (data.items.length === 0) {
                    cartItemsDiv.innerHTML = `
                        <div class="empty-cart">
                            <div class="empty-cart-icon">🛍️</div>
                            <div class="empty-cart-text">No items in cart yet<br>Start scanning products...</div>
                        </div>
                    `;
                } else {
                    // Group items by product
                    const itemsMap = {};
                    data.items.forEach(item => {
                        const key = item.product_id;
                        if (!itemsMap[key]) {
                            itemsMap[key] = { ...item };
                        } else {
                            itemsMap[key].quantity += item.quantity;
                            itemsMap[key].total = itemsMap[key].quantity * itemsMap[key].unit_price;
                        }
                    });

                    cartItemsDiv.innerHTML = Object.values(itemsMap).map(item => `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-name">${item.product_name}</div>
                                <div class="cart-item-details">
                                    ${item.quantity}x @ GHS ${item.unit_price.toFixed(2)}
                                </div>
                            </div>
                            <div class="cart-item-price">
                                <div class="cart-item-total">GHS ${item.total.toFixed(2)}</div>
                            </div>
                        </div>
                    `).join('');
                }

                totalAmountDiv.textContent = `GHS ${data.total_amount.toFixed(2)}`;
            } catch (error) {
                console.error('Failed to update cart:', error);
            }
        }

        // Update detection info
        function updateDetectionInfo(itemName, confidence) {
            const detectedItemDiv = document.getElementById('detectedItemName');
            const confidenceBar = document.getElementById('confidenceBar');
            const confidenceFill = document.getElementById('confidenceFill');
            const confidencePercent = document.getElementById('confidencePercent');
            const statusBadge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');

            lastDetectedItem = itemName;
            lastDetectionTime = Date.now();

            detectedItemDiv.textContent = itemName;
            detectedItemDiv.classList.remove('empty');

            const confidencePercent_ = Math.round(confidence * 100);
            confidencePercent.textContent = `${confidencePercent_}%`;
            confidenceFill.style.width = `${confidencePercent_}%`;
            confidenceBar.classList.add('visible');

            statusBadge.className = 'status-badge detected';
            statusText.textContent = `Item detected: ${itemName}`;
        }

        // Poll for cart updates
        function startCartPolling() {
            pollInterval = setInterval(updateCart, CART_UPDATE_INTERVAL);
            updateCart(); // Initial update
        }

        function stopCartPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        // Open payment modal
        async function openPaymentModal() {
            if (!currentTransactionId) return;

            try {
                const response = await fetch(`${API_BASE}/cart/${currentTransactionId}/`);
                const data = await response.json();

                // Populate receipt
                const receiptItems = document.getElementById('receiptItems');
                receiptItems.innerHTML = data.items.map(item => `
                    <div class="receipt-item">
                        <span class="receipt-item-name">${item.product_name} (${item.quantity}x)</span>
                        <span class="receipt-item-price">GHS ${item.total.toFixed(2)}</span>
                    </div>
                `).join('');

                document.getElementById('receiptTotal').textContent = `GHS ${data.total_amount.toFixed(2)}`;
                document.getElementById('transactionId').textContent = `TX-${currentTransactionId.toString().slice(-6).toUpperCase()}`;
                document.getElementById('transactionTime').textContent = new Date().toLocaleString();

                document.getElementById('receiptModal').classList.add('visible');
            } catch (error) {
                console.error('Failed to open payment modal:', error);
            }
        }

        // Complete checkout
        async function completeCheckout() {
            if (!currentTransactionId) return;

            try {
                const response = await fetch(`${API_BASE}/checkout-complete/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        transaction_id: currentTransactionId,
                        payment_method: 'card'
                    })
                });

                if (response.ok) {
                    console.log('Checkout completed');
                    playBeep(1000, 300); // Success beep
                }
            } catch (error) {
                console.error('Failed to complete checkout:', error);
            }
        }

        // Close receipt and start new transaction
        async function closeReceiptAndStartNew() {
            document.getElementById('receiptModal').classList.remove('visible');
            await completeCheckout();
            
            // Reset for new transaction
            currentTransactionId = null;
            lastDetectedItem = null;
            document.getElementById('detectedItemName').textContent = 'No item detected';
            document.getElementById('detectedItemName').classList.add('empty');
            document.getElementById('confidenceBar').classList.remove('visible');
            document.getElementById('statusBadge').className = 'status-badge scanning';
            document.getElementById('statusText').textContent = 'Scanning...';
            
            // Initialize new transaction
            await initTransaction();
        }

        // Clear cart
        async function clearCart() {
            if (confirm('Clear all items from cart?')) {
                // Reset for new transaction
                currentTransactionId = null;
                await initTransaction();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initTransaction();
            startCartPolling();
        });

        // WebSocket for real-time detection (optional enhancement)
        // For now, the detector.py polls the API and we poll the cart
    </script>
</body>
</html>
